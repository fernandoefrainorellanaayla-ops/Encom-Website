<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCOM | Master Ctrl Backdoor</title>
    <!-- Importación de fuentes necesarias para el look Linux/Dev -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
    <main class="terminal-container">
        <!-- Barra de estado superior (estilo Linux/Unix) -->
        <header class="top-banner">
            <div class="banner-content">
                <span class="system-status">SYSTEM: ONLINE</span>
                <span class="system-info">ENCOM_BACKDOOR_v8.2.0</span>
                <span class="system-user">user@encom:~$</span>
            </div>
        </header>

        <div class="terminal" id="terminal">
            <!-- Área donde se imprimen los resultados -->
            <div id="output"></div>
            
            <!-- Línea de entrada de comandos -->
            <div class="input-line">
                <span id="prompt">user@encom:~$</span>
                <textarea 
                    id="cmd-input" 
                    rows="1" 
                    autocomplete="off" 
                    spellcheck="false" 
                    autofocus
                ></textarea>
            </div>
        </div>
    </main>

    <script src="js/terminal.js"></script>
